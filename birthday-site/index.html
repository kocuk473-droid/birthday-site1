<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>С Днём Рождения Алекса</title>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#ff9ecf,#ffd6ec);
text-align:center;
overflow-x:hidden;
}

h1{
font-family:'Pacifico',cursive;
font-size:55px;
color:white;
margin-top:70px;
text-shadow:0 0 20px #ff4fa3;
}

.gift{
font-size:120px;
cursor:pointer;
transition:0.4s;
}

.gift:hover{
transform:scale(1.2);
}

.open{
animation:openGift 1s forwards;
}

@keyframes openGift{
0%{transform:scale(1)}
50%{transform:scale(1.5) rotate(10deg)}
100%{transform:scale(0);opacity:0}
}

#content{
display:none;
margin-top:20px;
padding:10px;
}

.text{
font-size:22px;
max-width:700px;
margin:auto;
color:#4a0030;
line-height:1.6;
}

.catphoto{
width:90%;
max-width:350px;
border-radius:20px;
box-shadow:0 0 30px rgba(0,0,0,0.3);
margin-top:20px;
}

.heart{
position:fixed;
top:-10px;
font-size:24px;
animation:fall linear forwards;
}

@keyframes fall{
to{
transform:translateY(110vh);
}
}

@media (max-width:600px){

h1{
font-size:36px;
margin-top:40px;
}

.text{
font-size:18px;
padding:10px;
}

.gift{
font-size:90px;
}

}

</style>

</head>

<body>

<h1>🎂 С Днём Рождения, Алекса 🎂</h1>

<div id="gift" class="gift" onclick="openGift()">🎁</div>

<div id="content">

<p class="text">

Я очень рад что ты у меня есть.<br><br>

Ты умная, крутая и вообще умничка.<br>
Как лучик солнца в моей жизни.<br><br>

Желаю всего лучшего (сумок до потолка).<br><br>

Спасибо тебе кішка (зміюка,відьмочка,  
и как без котакбаса.)

</p>

<img src="cat.jpg" class="catphoto">

<p style="font-size:22px;color:#8a004f;">
дякую за суп з хвіста лали 🐱
</p>

</div>

<audio autoplay loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<script>

function openGift(){

document.getElementById("gift").classList.add("open");

setTimeout(()=>{
document.getElementById("gift").style.display="none";
document.getElementById("content").style.display="block";
},900);

}

function createHeart(){

const heart=document.createElement("div");

heart.classList.add("heart");

const symbols=["💖","💕","🐱","💗"];

heart.innerHTML=symbols[Math.floor(Math.random()*symbols.length)];

heart.style.left=Math.random()*100+"vw";

heart.style.animationDuration=(Math.random()*3+3)+"s";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},6000);

}

setInterval(createHeart,250);

</script>

</body>
</html>
